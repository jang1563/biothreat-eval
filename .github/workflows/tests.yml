name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build package
        if: matrix.python-version == '3.13'
        run: python -m build

      - name: Verify wheel imports outside repository
        if: matrix.python-version == '3.13'
        run: |
          python -m venv /tmp/biothreat-wheel-check
          /tmp/biothreat-wheel-check/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/biothreat-wheel-check/bin/python -c "import models, risk_model, run; print('wheel import ok')"
