name: Documentation improvement
description: Suggest a clarification or improvement to public documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What documentation should change?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the relevant page or section.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Wording
      description: Optional suggested replacement text.
